services:
  # ── Backend: FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: documate-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-haiku-4-5-20251001
      - key: PYTHON_VERSION
        value: 3.12.4

  # ── Frontend: Streamlit ─────────────────────────────────────────────────────
  - type: web
    name: documate-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start_frontend.sh
    envVars:
      - key: BACKEND_HOST
        fromService:
          type: web
          name: documate-api
          property: host
      - key: PYTHON_VERSION
        value: 3.12.4
