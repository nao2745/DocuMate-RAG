<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMate - 社内ドキュメント Q&A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 18px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            border-color: #667eea;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.1);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .card-description {
            color: #666;
            line-height: 1.6;
            font-size: 14px;
        }

        .chat-section {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 30px;
            margin-top: 30px;
        }

        .chat-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .response-area {
            background: white;
            border-radius: 6px;
            padding: 20px;
            margin-top: 20px;
            min-height: 100px;
            border: 1px solid #f0f0f0;
        }

        .response-area.empty {
            color: #999;
            font-style: italic;
        }

        .response-text {
            margin-bottom: 15px;
            line-height: 1.8;
            color: #333;
        }

        .sources {
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
        }

        .sources-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .source {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #666;
        }

        .source-name {
            font-weight: 600;
            color: #333;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .content {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px;
            }

            .logo {
                font-size: 32px;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📚 DocuMate</div>
            <div class="subtitle">社内ドキュメント Q&A システム</div>
        </div>

        <div class="content">
            <div class="card">
                <div class="card-title">📄 ドキュメント管理</div>
                <div class="card-description">
                    PDFやWord、Markdown形式のドキュメントをアップロードして、RAG技術で知識ベースを構築します。
                </div>
            </div>
            <div class="card">
                <div class="card-title">🔍 高精度検索</div>
                <div class="card-description">
                    ハイブリッド検索とベクトルDB技術により、質問に最適なドキュメントを自動検索します。
                </div>
            </div>
            <div class="card">
                <div class="card-title">✨ AI回答生成</div>
                <div class="card-description">
                    LLMが取得したコンテキストをもとに、根拠のある正確な回答を生成します。
                </div>
            </div>
            <div class="card">
                <div class="card-title">📌 引用表示</div>
                <div class="card-description">
                    すべての回答にはソース参照が含まれ、情報の信頼性が保証されます。
                </div>
            </div>
        </div>

        <div class="chat-section">
            <h2>💬 質問を入力してください</h2>
            <div class="input-group">
                <input 
                    type="text" 
                    id="questionInput"
                    placeholder="例: 休暇申請の手続きは？"
                    onkeypress="handleKeyPress(event)"
                >
                <button onclick="submitQuestion()">送信</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>回答を生成中...</p>
            </div>

            <div class="response-area empty" id="responseArea">
                ここに回答が表示されます
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function submitQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();

            if (!question) {
                alert('質問を入力してください');
                return;
            }

            const loading = document.getElementById('loading');
            const responseArea = document.getElementById('responseArea');

            loading.classList.add('active');
            responseArea.textContent = '';

            try {
                const response = await fetch(`${API_BASE}/api/chat/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        session_id: getOrCreateSessionId(),
                    }),
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.statusText}`);
                }

                const data = await response.json();
                displayResponse(data);
                input.value = '';
            } catch (error) {
                console.error('Error:', error);
                responseArea.classList.remove('empty');
                responseArea.innerHTML = `<div style="color: red;">エラーが発生しました: ${error.message}</div>`;
            } finally {
                loading.classList.remove('active');
            }
        }

        function displayResponse(data) {
            const responseArea = document.getElementById('responseArea');
            responseArea.classList.remove('empty');

            let html = `<div class="response-text">${escapeHtml(data.answer)}</div>`;

            if (data.sources && data.sources.length > 0) {
                html += '<div class="sources">';
                html += '<div class="sources-title">📚 参考ドキュメント</div>';
                data.sources.forEach(source => {
                    html += `
                        <div class="source">
                            <div class="source-name">${escapeHtml(source.filename)}</div>
                            <div>ページ: ${source.page} | スコア: ${(source.score * 100).toFixed(1)}%</div>
                            <div style="margin-top: 5px; font-style: italic; color: #999;">
                                ${escapeHtml(source.excerpt.substring(0, 100))}...
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            }

            responseArea.innerHTML = html;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitQuestion();
            }
        }

        function getOrCreateSessionId() {
            let sessionId = sessionStorage.getItem('documate_session_id');
            if (!sessionId) {
                sessionId = 'session_' + Math.random().toString(36).substring(2, 11);
                sessionStorage.setItem('documate_session_id', sessionId);
            }
            return sessionId;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Test API connectivity on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    console.log('✓ API connected');
                }
            } catch (error) {
                console.warn('⚠ API not reachable yet');
            }
        });
    </script>
</body>
</html>
